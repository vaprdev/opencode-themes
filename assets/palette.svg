<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title description">
  <title id="title">Poimandres color palette</title>
  <desc id="description">The primary background, text, blue, cyan, mint, red, pink, and yellow colors used by the theme.</desc>
  <rect width="1200" height="360" rx="18" fill="#1b1e28"/>
