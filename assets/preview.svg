<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Poimandres theme for OpenCode preview</title>
  <desc id="description">An illustrative OpenCode conversation with Markdown, TypeScript syntax, and a diff using the Poimandres palette.</desc>
  <rect width="1200" height="720" rx="18" fill="#1b1e28"/>
  <rect x="1" y="1" width="1198" height="718" rx="17" fill="none" stroke="#303340" stroke-width="2"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <circle cx="30" cy="29" r="6" fill="#d0679d"/>
    <circle cx="50" cy="29" r="6" fill="#fffac2"/>
    <circle cx="70" cy="29" r="6" fill="#5DE4c7"/>
    <text x="600" y="35" fill="#767c9d" font-size="14" text-anchor="middle">console  /  opencode</text>
    <line x1="0" y1="58" x2="1200" y2="58" stroke="#303340"/>

    <rect x="24" y="82" width="78" height="28" rx="6" fill="#303340"/>
    <text x="63" y="101" fill="#ADD7FF" font-size="13" text-anchor="middle">YOU</text>
    <text x="122" y="101" fill="#e4f0fb" font-size="15">Add a budget guard before inference requests are forwarded.</text>

    <rect x="24" y="136" width="78" height="28" rx="6" fill="#303340"/>
    <text x="63" y="155" fill="#5DE4c7" font-size="13" text-anchor="middle">BUILD</text>
    <text x="122" y="155" fill="#e4f0fb" font-size="16" font-weight="700">Implementing the budget guard</text>
    <text x="122" y="184" fill="#a6accd" font-size="14">The request is rejected before proxying when the remaining budget is exhausted.</text>

    <rect x="122" y="208" width="1038" height="184" rx="9" fill="#202430" stroke="#303340"/>
    <rect x="122" y="208" width="1038" height="34" rx="9" fill="#303340"/>
    <rect x="122" y="233" width="1038" height="9" fill="#303340"/>
    <text x="142" y="230" fill="#7390AA" font-size="13">budget-guard.ts</text>
    <g font-size="14">
      <text x="142" y="269" fill="#767c9d">1</text>
      <text x="180" y="269"><tspan fill="#a6accd">export const</tspan><tspan fill="#ADD7FF"> enforceBudget</tspan><tspan fill="#a6accd"> = </tspan><tspan fill="#ADD7FF">Effect.fn</tspan><tspan fill="#a6accd">(</tspan><tspan fill="#5DE4c7">&quot;Budget.enforce&quot;</tspan><tspan fill="#a6accd">)(</tspan></text>
      <text x="142" y="297" fill="#767c9d">2</text>
      <text x="180" y="297"><tspan fill="#e4f0fb">  request</tspan><tspan fill="#a6accd"> =&gt; </tspan><tspan fill="#ADD7FF">Effect.gen</tspan><tspan fill="#a6accd">(</tspan><tspan fill="#a6accd">function*</tspan><tspan fill="#a6accd"> () {</tspan></text>
      <text x="142" y="325" fill="#767c9d">3</text>
      <text x="180" y="325"><tspan fill="#a6accd">    const</tspan><tspan fill="#e4f0fb"> remaining</tspan><tspan fill="#a6accd"> = </tspan><tspan fill="#a6accd">yield*</tspan><tspan fill="#ADD7FF"> Budget.remaining</tspan><tspan fill="#a6accd">(request.orgId)</tspan></text>
      <text x="142" y="353" fill="#767c9d">4</text>
      <text x="180" y="353"><tspan fill="#a6accd">    if</tspan><tspan fill="#a6accd"> (remaining &lt;= </tspan><tspan fill="#5DE4c7">0</tspan><tspan fill="#a6accd">) </tspan><tspan fill="#a6accd">return yield*</tspan><tspan fill="#d0679d"> new BudgetExceeded</tspan><tspan fill="#a6accd">()</tspan></text>
      <text x="142" y="381" fill="#767c9d">5</text>
      <text x="180" y="381" fill="#a6accd">  })</text>
    </g>

    <text x="122" y="431" fill="#e4f0fb" font-size="16" font-weight="700">Changes</text>
    <rect x="122" y="450" width="1038" height="160" rx="9" fill="#202430" stroke="#303340"/>
    <rect x="122" y="450" width="1038" height="34" rx="9" fill="#303340"/>
    <rect x="122" y="475" width="1038" height="9" fill="#303340"/>
    <text x="142" y="472" fill="#89ddff" font-size="13">@@ apps/server/src/services/proxy/proxy.ts</text>
    <rect x="123" y="490" width="1036" height="27" fill="#332631"/>
    <rect x="123" y="517" width="1036" height="27" fill="#233037"/>
    <rect x="123" y="544" width="1036" height="27" fill="#233037"/>
    <g font-size="14">
      <text x="142" y="509" fill="#d0679d">-</text>
      <text x="180" y="509" fill="#f087bd">const response = yield* provider.forward(request)</text>
      <text x="142" y="536" fill="#5fb3a1">+</text>
      <text x="180" y="536" fill="#5DE4c7">yield* enforceBudget(request)</text>
      <text x="142" y="563" fill="#5fb3a1">+</text>
      <text x="180" y="563" fill="#5DE4c7">const response = yield* provider.forward(request)</text>
      <text x="142" y="590" fill="#767c9d"> </text>
      <text x="180" y="590" fill="#a6accd">yield* ledger.record(response.usage)</text>
    </g>

    <circle cx="133" cy="652" r="5" fill="#5DE4c7"/>
    <text x="149" y="657" fill="#a6accd" font-size="14">2 files changed</text>
    <text x="1128" y="657" fill="#767c9d" font-size="13" text-anchor="end">claude-sonnet  |  build</text>
    <rect x="24" y="683" width="1152" height="1" fill="#303340"/>
    <text x="24" y="707" fill="#7390AA" font-size="12">Illustrative preview</text>
  </g>
</svg>
